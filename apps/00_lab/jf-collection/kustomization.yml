---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media

# insert a separate file as a configmap
configMapGenerator:
- name: jf-collection-configmap
  files:
  - config.yml

# needed for pruning in the Jenkinsfile
generatorOptions:
  labels:
    app: jf-collection

resources:
  - pvc.yml
  - deployment.yml
  - sealed-secret-api-keys.yml

