---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace:  media
  labels:
    app: navidrome
spec:
  selector:
    matchLabels:
      app: navidrome
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      restartPolicy: Always
      containers:
        - name: navidrome
          image: deluan/navidrome:latest@sha256:9fa40b3d8dec43ceb2213d1fa551da3dcfef6ac6d19c2e534efb92527c2bafd2
          resources:
            limits:
              cpu: 4
              memory: 4Gi
            requests:
              cpu: 1
              memory: 512Mi
          ports:
            - containerPort: 4533
          volumeMounts:
          - name: navidrome-music
            mountPath:  /music
          - name: navidrome-data
            mountPath:  /data
          - name: navidrome-config
            mountPath: /data/navidrome.toml
            subPath:  navidrome.toml
      volumes:
      - name: navidrome-music
        hostPath:
          path: /mnt/mobius/Music/library
      - name: navidrome-data
        persistentVolumeClaim:
          claimName:  navidrome-config-data
      - name: navidrome-config
        configMap:
          name: navidrome-configmap