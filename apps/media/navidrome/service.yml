---
apiVersion: v1
kind: Service
metadata:
  name: navidrome
  namespace:  media
  annotations:
    metallb.universe.tf/allow-shared-ip: "navidrome-metallb-ip"  
spec:
  ipFamilyPolicy: SingleStack
  selector:
    app: navidrome
  ports:
    - name: navidrome-web-ui
      port: 4533
      targetPort: 4533
  type: LoadBalancer
  loadBalancerIP: 192.168.13.41