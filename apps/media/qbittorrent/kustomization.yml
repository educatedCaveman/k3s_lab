---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media

# insert a separate file as a configmap
configMapGenerator:
- name: qbittorrent-qbt-configmap
  files:
  - qBittorrent.conf

# needed for pruning in the Jenkinsfile
generatorOptions:
  labels:
    app: qbittorrent

resources:
  - sealed-secret-pia-vpn-creds.yml
  - deployment.yml
  - service.yml
  - pv.yml
  - pvc.yml