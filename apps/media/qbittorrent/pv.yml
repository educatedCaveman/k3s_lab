---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-nfs-pv
  namespace:  media
spec:
  capacity:
    storage: 500Gi
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  nfs:
    path: /mnt/storage_node/temp/qbittorrent
    server: 192.168.11.2
  persistentVolumeReclaimPolicy: Retain