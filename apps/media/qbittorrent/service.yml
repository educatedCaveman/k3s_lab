---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace:  media
  annotations:
    metallb.universe.tf/allow-shared-ip: "qbittorrent-metallb-ip"  
spec:
  ipFamilyPolicy: SingleStack
  selector:
    app: qbittorrent
  ports:
    - name: qbittorrent
      port: 8080
      targetPort: 8080
  type: LoadBalancer
  loadBalancerIP: 192.168.13.38